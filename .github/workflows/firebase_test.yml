name: Firebase Test Lab Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull code from GitHub (Updated to v5)
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Set up Java (Updated to v5)
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Gradle (Provides gradle automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. Build Debug APK using installed Gradle
      - name: Build Debug APK
        run: gradle assembleDebug

      # 5. Authenticate to Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 6. Set up Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 7. Run Robo Test on Firebase Test Lab
      - name: 'Run Robo Test on Firebase Test Lab'
        run: |
          gcloud firebase test android run \
            --type robo \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --device model=MediumPhone,version=34,locale=en,orientation=portrait \
            --timeout 3m