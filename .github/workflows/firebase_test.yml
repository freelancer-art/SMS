name: Firebase Test Lab Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the codebase from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Grant permissions to build script
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # 4. Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Authenticate with Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 6. Set up gcloud CLI
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 7. Send APK to Firebase Test Lab for Robo Crawl
      - name: 'Run Robo Test on Firebase Test Lab'
        run: |
          gcloud firebase test android run \
            --type robo \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --device model=MediumPhone,version=34,locale=en,orientation=portrait \
            --timeout 3m