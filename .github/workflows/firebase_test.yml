name: Build & Test Android App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Setup Java 21 for Android compilation
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 4. Install dependencies and build web frontend
      - name: Install & Build Web App
        run: |
          npm install
          npm run build

      # 5. Initialize Capacitor & create the Android platform
      - name: Setup Capacitor and Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          npx cap init "AIStudioApp" "com.aistudio.app" --web-dir "dist"
          npx cap add android
          npx cap sync android

      # 6. Build the Android Debug APK
      - name: Build Android APK
        run: |
          cd android
          gradle wrapper
          ./gradlew assembleDebug

      # 7. Authenticate to Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 8. Setup Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 9. Run Robo Test on Firebase Test Lab
      - name: 'Run Robo Test on Firebase Test Lab'
        run: |
          gcloud firebase test android run \
            --type robo \
            --app android/app/build/outputs/apk/debug/app-debug.apk \
            --device model=MediumPhone,version=34,locale=en,orientation=portrait \
            --timeout 3m