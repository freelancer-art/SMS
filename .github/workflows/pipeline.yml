name: Housing Society SaaS CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  quality-gate:
    name: "Stage 1: Quality Gate & Automated Testing"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Quality Gate - Happy Path Tests
        run: npm run test:happy

      - name: Run Quality Gate - Security & RLS Isolation Tests
        run: npm run test:security

      - name: Run Quality Gate - Negative & Edge Case Tests
        run: npm run test:negative

      - name: Run Quality Gate - Performance SLA Benchmark Tests
        run: npm run test:performance

  build-and-distribute:
    name: "Stage 2: Build & Distribute (Firebase App Distribution)"
    needs: quality-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Setup Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Build Web Application
        run: npm run build

      - name: Setup Capacitor & Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          npx cap init "HousingSocietyApp" "com.aistudio.housingsociety" --web-dir "dist"
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          gradle wrapper
          ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v11.16.0
        with:
          args: appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" --groups "testers" --release-notes "Automated CI/CD build triggered by commit ${{ github.sha }}"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
