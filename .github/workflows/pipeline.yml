name: Housing Society SaaS CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  quality-gate:
    name: "Stage 1: Quality Gate & Automated Testing"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Quality Gate - Happy Path Tests
        run: npm run test:happy

      - name: Run Quality Gate - Security & RLS Isolation Tests
        run: npm run test:security

      - name: Run Quality Gate - Negative & Edge Case Tests
        run: npm run test:negative

      - name: Run Quality Gate - Performance SLA Benchmark Tests
        run: npm run test:performance

  build-and-distribute:
    name: "Stage 2: Build & Distribute (Firebase App Distribution)"
    needs: quality-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Setup Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Build Web Application
        run: npm run build

      - name: Setup Capacitor & Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          npx cap init "HousingSocietyApp" "com.housing.society" --web-dir "dist"
          npx cap add android
          npx cap sync android

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        run: |
          if [ -z "$FIREBASE_SA_KEY" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "::warning ::FIREBASE_SERVICE_ACCOUNT_KEY or FIREBASE_ANDROID_APP_ID secret is not configured in GitHub repository settings."
            echo "Please add these secrets under Repository Settings -> Secrets and variables -> Actions to enable automatic APK distribution."
            exit 0
          fi
          echo "$FIREBASE_SA_KEY" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npx firebase-tools appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "testers" \
            --release-notes "Automated CI/CD build triggered by commit ${{ github.sha }}" || {
              EXIT_CODE=$?
              rm -f service-account.json
              exit $EXIT_CODE
            }
          rm -f service-account.json
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
